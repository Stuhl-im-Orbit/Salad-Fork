# -------------------------- Salad Fork 180 printer.cfg --------------------------
#
#   Mainboard:        Bigtreetech Manta M8P V2.0
#   Toolboard:        Bigtreetech EBB36 CAN V1.2.1
#   Toolhead:         A4T
#   Toolhead Fan:     3Pin Delta 15000 RPM
#   Probe:            Cartographer V4 (CAN Mode)
#   Extruder:         WristWatch-G2 (LDO-36STH20-1004AHG-9T 1.00A Peak)
#   Hotend:           Phaetus Rapido 2F Plus UHF
#   Motors A/B:       Moons MS14HS5P4150 (1.5A Peak)
#   Motors Z:         Moons LE174S-T0808-200-AR3-S-065 (0.65A Peak)
#   Filament Sensor:  BTT SFS V2.0
#   Documentation:    https://github.com/Stuhl-im-Orbit/Salad-Fork
#
# ------------------------------------------------------------------------------

# Include standard Mainsail web interface macros
[include mainsail.cfg]

# Main controller board (Manta M8P) CAN bus UUID
[mcu]
canbus_uuid:                26ba4180df89

# Toolhead board (EBB36) CAN bus UUID
[mcu ebb36]
canbus_uuid:                19f06894b5c0

# Eddy current probe (Cartographer) CAN bus UUID
[mcu cartographer]
canbus_uuid:                d01f7feb964e

# General printer kinematics and limits
[printer]
kinematics:                 corexy
max_velocity:               400
max_accel:                  7500
max_z_velocity:             10
max_z_accel:                50
square_corner_velocity:     5

# Enable support for excluding specific objects during a print
[exclude_object]

# Allow overriding safety limits for debugging or initial setup
[force_move]
enable_force_move:          True

# Enable G2/G3 arc support
[gcode_arcs]
resolution:                 1.0

# Enable generic console responses
[respond]

# Input shaper tuning macro visibility settings
[shaketune]
show_macros_in_webui:       True

# Enable software skew correction
[skew_correction]


# ------------------------------------------------------------------------------
# HARDWARE: X / Y / Z STEPPERS & DRIVERS
# ------------------------------------------------------------------------------

# X-axis stepper motor configuration (B motor in CoreXY)
[stepper_x]
step_pin:                   PE2
dir_pin:                    PE1
enable_pin:                 !PE4
rotation_distance:          32
microsteps:                 32
full_steps_per_rotation:    200
endstop_pin:                tmc2209_stepper_x:virtual_endstop
position_min:               0
position_max:               180
position_endstop:           180
homing_speed:               40
homing_retract_dist:        0
homing_positive_dir:        True

# TMC2209 stepper driver settings for X
[tmc2209 stepper_x]
uart_pin:                   PE3
diag_pin:                   ^PF3
interpolate:                True
run_current:                0.85
sense_resistor:             0.110

# Motor autotuning for optimal performance (X-axis)
[autotune_tmc stepper_x]
motor:                      moons-ms14hs5p4150
tuning_goal:                performance
sg4_thrs:                   120 # Sensorless homing sensitivity
voltage:                    24

# Y-axis stepper motor configuration (A motor in CoreXY)
[stepper_y]
step_pin:                   PE6
dir_pin:                    PE5
enable_pin:                 !PC14
rotation_distance:          32
microsteps:                 32
full_steps_per_rotation:    200
endstop_pin:                tmc2209_stepper_y:virtual_endstop
position_min:               -15
position_max:               180
position_endstop:           180
homing_speed:               40
homing_retract_dist:        0
homing_positive_dir:        True

# TMC2209 stepper driver settings for Y
[tmc2209 stepper_y]
uart_pin:                   PC13
diag_pin:                   ^PF4
interpolate:                True
run_current:                0.85
sense_resistor:             0.110

# Motor autotuning for optimal performance (Y-axis)
[autotune_tmc stepper_y]
motor:                      moons-ms14hs5p4150
tuning_goal:                performance
sg4_thrs:                   120 # Sensorless homing sensitivity
voltage:                    24

# Front Left Z-axis stepper (Z0)
[stepper_z]
step_pin:                   PB8
dir_pin:                    !PB7
enable_pin:                 !PE0
rotation_distance:          8
microsteps:                 32
full_steps_per_rotation:    200
endstop_pin:                probe:z_virtual_endstop
position_min:               -5
position_max:               180
homing_retract_dist:        0
homing_speed:               8
second_homing_speed:        3

[tmc2209 stepper_z]
uart_pin:                   PB9
interpolate:                True
run_current:                0.40
sense_resistor:             0.110

[autotune_tmc stepper_z]
motor:                      moons-le174s-t0808-200-ar3-s-065
tuning_goal:                silent
voltage:                    24

# Rear Z-axis stepper (Z1)
[stepper_z1]
step_pin:                   PB4
dir_pin:                    !PB3
enable_pin:                 !PB6
rotation_distance:          8
microsteps:                 32
full_steps_per_rotation:    200

[tmc2209 stepper_z1]
uart_pin:                   PB5
interpolate:                True
run_current:                0.40
sense_resistor:             0.110

[autotune_tmc stepper_z1]
motor:                      moons-le174s-t0808-200-ar3-s-065
tuning_goal:                silent
voltage:                    24

# Front Right Z-axis stepper (Z2)
[stepper_z2]
step_pin:                   PG13
dir_pin:                    !PG12
enable_pin:                 !PG15
rotation_distance:          8
microsteps:                 32
full_steps_per_rotation:    200

[tmc2209 stepper_z2]
uart_pin:                   PG14
interpolate:                True
run_current:                0.40
sense_resistor:             0.110

[autotune_tmc stepper_z2]
motor:                      moons-le174s-t0808-200-ar3-s-065
tuning_goal:                silent
voltage:                    24


# ------------------------------------------------------------------------------
# CALIBRATION: BED LEVELING & MESH
# ------------------------------------------------------------------------------

# Defines bed pivot points and probing points for 3-point automated Z alignment
[z_tilt]
z_positions:
    -50, -13
     90, 217
    213, -13
points:
     20, 10
     90, 155
    160, 10
speed:                      150
horizontal_move_z:          15
retry_tolerance:            0.0100

# Adaptive bed mesh parameters
[bed_mesh]
zero_reference_position:    90, 90
speed:                      150
horizontal_move_z:          3
mesh_min:                   10, 25
mesh_max:                   170, 158
probe_count:                20, 20
adaptive_margin:            10
mesh_pps:                   0, 0

# Compensates for structural twist in the X-axis extrusion
[axis_twist_compensation]
speed:                      150
calibrate_start_x:          20
calibrate_end_x:            160
calibrate_y:                90


# ------------------------------------------------------------------------------
# HARDWARE: EXTRUDER & HOTEND
# ------------------------------------------------------------------------------

# Extruder configuration using EBB36 toolboard
[extruder]
step_pin:                   ebb36:PD0
dir_pin:                    !ebb36:PD1
enable_pin:                 !ebb36:PD2
rotation_distance:          47.088
gear_ratio:                 9:1
microsteps:                 16
full_steps_per_rotation:    200
nozzle_diameter:            0.400
filament_diameter:          1.75
max_extrude_only_velocity:  60
max_extrude_only_distance:  200
max_extrude_cross_section:  5
heater_pin:                 ebb36:PB13
min_temp:                   10
max_temp:                   330
max_power:                  1.0
min_extrude_temp:           170
sensor_type:                MAX31865
sensor_pin:                 ebb36:PA4
spi_software_sclk_pin:      ebb36:PA5
spi_software_mosi_pin:      ebb36:PA7
spi_software_miso_pin:      ebb36:PA6
rtd_nominal_r:              1000
rtd_reference_r:            4300
rtd_num_of_wires:           2
rtd_use_50Hz_filter:        True
pressure_advance:           0.030
pressure_advance_smooth_time: 0.025

[tmc2209 extruder]
uart_pin:                   ebb36:PA15
interpolate:                True
run_current:                0.60
sense_resistor:             0.110

[autotune_tmc extruder]
motor:                      ldo-36sth20-1004ahg-9T
tuning_goal:                performance
voltage:                    24

# Defines parameters for G10/G11 firmware retraction
[firmware_retraction]
retract_length:             0.8
retract_speed:              60
unretract_extra_length:     0
unretract_speed:            60


# ------------------------------------------------------------------------------
# HARDWARE: CARTOGRAPHER PROBE & RESONANCE TESTING
# ------------------------------------------------------------------------------

# Core Cartographer settings
[cartographer]
mcu:                        cartographer
x_offset:                   0
y_offset:                   21.1
travel_speed:               50
verbose:                    false

# Cartographer high-speed scanning mode for bed mesh
[cartographer scan]
probe_speed:                5
mesh_runs:                  2
mesh_direction:             x
mesh_height:                3
mesh_path:                  snake

# Cartographer physical touch probing settings (nozzle tap alternative)
[cartographer touch]
samples:                    3
max_samples:                10
sample_range:               0.01
retract_distance:           2
UNSAFE_max_touch_temperature: 152

# Cartographer temperature compensation sensor
[cartographer coil]
name:                       cartographer_coil
min_temp:                   0
max_temp:                   105

# Accelerometer on the Cartographer probe (Toolhead)
[adxl345 cartographer]
cs_pin:                     cartographer:PA0
spi_bus:                    spi1

# Accelerometer on the EBB36 Toolboard
[adxl345 ebb36]
cs_pin:                     ebb36:PB12
spi_bus:                    spi2_PB2_PB11_PB10
axes_map:                   x,y,z

# Configuration for automated input shaper calibration
[resonance_tester]
accel_chip:                 adxl345 cartographer
probe_points:               90, 90, 20

# Calculated input shaper frequencies to reduce ringing/ghosting
[input_shaper]
shaper_type_x:              mzv
shaper_freq_x:              50.0
shaper_type_y:              mzv
shaper_freq_y:              50.0


# ------------------------------------------------------------------------------
# HARDWARE: FANS, HEATERS & LIGHTING
# ------------------------------------------------------------------------------

# Part cooling fan on the toolhead
[fan]
pin:                        ebb36:PA1
max_power:                  1.0
kick_start_time:            0.5
off_below:                  0.10
cycle_time:                 0.010

# Hotend heatsink cooling fan with RPM monitoring
[heater_fan hotend_fan]
pin:                        ebb36:PA0
tachometer_pin:             ^ebb36:PB9
tachometer_ppr:             2
tachometer_poll_interval:   0.0009
max_power:                  1.0
kick_start_time:            0.5
heater:                     extruder
heater_temp:                50.0

# Neopixel LED strip on the toolhead
[neopixel toolhead_leds]
pin:                        ebb36:PD3
chain_count:                3
color_order:                GRB

# Heated bed configuration
[heater_bed]
heater_pin:                 PF5
sensor_type:                Generic 3950
sensor_pin:                 PB1
max_power:                  0.8
min_temp:                   0
max_temp:                   120
control:                    pid
pid_kp:                     58.437
pid_ki:                     2.347
pid_kd:                     363.769

# Electronic bay cooling fan (turns on when steppers/heaters are active)
[controller_fan controller_fan]
pin:                        PF7
kick_start_time:            2
max_power:                  0.60
heater:                     extruder
stepper:                    stepper_x, stepper_y, stepper_z

# Nevermore VOC filtration system fan
[fan_generic nevermore]
pin:                        PF9
max_power:                  1.0
shutdown_speed:             0.0
kick_start_time:            5.0
cycle_time:                 0.01
off_below:                  0.1


# ------------------------------------------------------------------------------
# SENSORS: TEMPERATURE & FILAMENT
# ------------------------------------------------------------------------------

# Host (Raspberry Pi/BTT Pi) CPU temperature
[temperature_sensor pi]
sensor_type:                temperature_host
min_temp:                   5
max_temp:                   100

# Manta M8P MCU temperature
[temperature_sensor mcu]
sensor_type:                temperature_mcu
min_temp:                   5
max_temp:                   100

# EBB36 Toolboard MCU temperature
[temperature_sensor mcu_ebb36]
sensor_type:                temperature_mcu
sensor_mcu:                 ebb36
min_temp:                   5
max_temp:                   100

# Cartographer probe MCU temperature
[temperature_sensor cartographer]
sensor_type:                temperature_mcu
sensor_mcu:                 cartographer
min_temp:                   5
max_temp:                   105

# Chamber temperature thermistor
[temperature_sensor chamber]
sensor_type:                Generic 3950
sensor_pin:                 PC5
min_temp:                   0
max_temp:                   70

# Filament switch sensor (detects physical presence of filament)
[filament_switch_sensor filament_switch]
switch_pin:                 ^PF0
pause_on_runout:            false
runout_gcode:
    {% if printer.print_stats.state|default("standby")|string|lower == "printing" %}
        _NOTIFY MSG="Filament: Switch detected runout."
        M600
    {% endif %}
insert_gcode:
    _NOTIFY MSG="Filament: Switch detected filament insertion."

# Filament motion sensor (detects jams/clogs by measuring movement)
[filament_motion_sensor filament_motion]
switch_pin:                 ^PC15
detection_length:           4.00
extruder:                   extruder
pause_on_runout:            false
runout_gcode:
    {% if printer.print_stats.state|default("standby")|string|lower == "printing" %}
        _NOTIFY MSG="Filament: Encoder detected runout."
        M600
    {% endif %}
insert_gcode:
    _NOTIFY MSG="Filament: Encoder detected filament insertion."


# ------------------------------------------------------------------------------
# MISCELLANEOUS & SAFETY
# ------------------------------------------------------------------------------

# Maps multiple pins to a single caselight output
[multi_pin caselight_pins]
pins:                       PF6, PF8

# Chamber lighting control
[output_pin caselight]
pin:                        multi_pin:caselight_pins
pwm:                        True
cycle_time:                 0.01
value:                      1.0
shutdown_value:             0.0

# Handles actions when printer is inactive for a specified duration
[idle_timeout]
timeout: 3600
gcode:
    {% if printer.pause_resume.is_paused %}
        ; Keep bed on during pauses (like filament runout) to prevent part detachment
        _NOTIFY MSG="System: Idle timeout. Extruder OFF, Bed stays ON to save print."
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    {% else %}
        _NOTIFY MSG="System: Idle timeout. Steppers OFF, Heaters OFF."
        TURN_OFF_HEATERS
        M107
        SET_FAN_SPEED FAN=nevermore SPEED=0.0
        UPDATE_DELAYED_GCODE ID=_STOP_NEVERMORE DURATION=0
        M84
    {% endif %}

# Safety macro: Checks hotend fan RPM to prevent heat creep
[delayed_gcode _FAN_GUARD]
initial_duration: 5.0
gcode:
    {% set fan_rpm = printer['heater_fan hotend_fan'].rpm|default(0)|float %}
    {% set extruder_temp = printer.extruder.temperature|float %}
    {% set extruder_target = printer.extruder.target|float %}

    {% if extruder_target >= 50.0 and extruder_temp >= 60.0 %}
        {% if fan_rpm < 7000 %}
            _NOTIFY MSG="System: Error - Hotend fan"
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
            {% if printer.print_stats.state|default("standby")|string|lower == "printing" %}
                PAUSE
            {% endif %}
        {% endif %}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_FAN_GUARD DURATION=5.0


# ------------------------------------------------------------------------------
# MACROS: VARIABLES & INITIALIZATION
# ------------------------------------------------------------------------------

# Variables utilized by Mainsail
[gcode_macro _CLIENT_VARIABLE]
description: Mainsail config variables
variable_use_custom_pos:    True                ; Enable custom park positions
variable_custom_park_x:     90.0                ; Custom park position for X
variable_custom_park_y:     170.0               ; Custom park position for Y
variable_custom_park_dz:    15.0                ; Custom park Z hop height
variable_speed_move:        300.0               ; Toolhead park move speed
variable_park_at_cancel:    True                ; Park toolhead on print cancel
variable_use_fw_retract:    True                ; Use firmware retraction in macros
variable_idle_timeout:      43200               ; Set to 12h
variable_user_pause_macro:  "_HOOK_ON_PAUSE"    ; Hook: Triggered inside PAUSE
variable_user_resume_macro: "_HOOK_ON_RESUME"   ; Hook: Triggered inside RESUME
variable_user_cancel_macro: "_HOOK_ON_CANCEL"   ; Hook: Triggered inside CANCEL_PRINT
gcode:
    ; Mandatory G-Code section for variable macros

# Custom user-defined printer variables for centralized configuration
[gcode_macro _MY_VARS]
description: Global printer variables
; --- Movement & Travel ---
variable_cfg_travel_factor_xy: 0.8              ; Speed factor for X/Y travel moves
variable_cfg_travel_factor_z:  0.8              ; Speed factor for Z travel moves
variable_cfg_z_hop_home:       10.0             ; Z-hop height before homing/moving (mm)
variable_cfg_z_hop_heat:       15.0             ; Z-hop height during heat soak (mm)
; --- Computed Values (Pre-initialized with fallbacks to avoid 0 if boot macro fails) ---
variable_calc_travel_speed_xy: 19200            ; Fallback: 400 max_vel * 0.8 * 60 (Keep in sync with max_velocity)
variable_calc_travel_speed_z:  1440             ; Fallback: 30 max_z_vel * 0.8 * 60 (Keep in sync with max_z_velocity)
variable_calc_center_x:        90.0             ; Fallback: 180 max_x / 2 (Keep in sync with stepper_x position_max)
variable_calc_center_y:        90.0             ; Fallback: 180 max_y / 2 (Keep in sync with stepper_y position_max)
; --- Temperatures & Timers ---
variable_cfg_bed_high_temp:    90.0             ; Bed temperature threshold for ABS/ASA/Nevermore (C)
variable_cfg_fallback_temp_ext: 220.0           ; Fallback/default extruder temperature (C)
variable_cfg_preheat_ext:      150.0            ; Hotend temperature during bed heat soak (C)
; --- Nozzle Wiping ---
variable_cfg_wipe_x:           138.0            ; Absolute X position of the wiper center
variable_cfg_wipe_y:           -12.3            ; Absolute Y position of the wiper center
variable_cfg_wipe_z:           3.18             ; Z height for the nozzle to touch the wiper
variable_cfg_wipe_width:       40.0             ; Full width of the wiper in mm
variable_cfg_wipe_speed:       4000             ; Feedrate for wipe moves (mm/min)
; --- Prime Blob ---
variable_cfg_purge_x:          5.0              ; Absolute X start position for prime blob
variable_cfg_purge_y:          5.0              ; Absolute Y start position for prime blob
; --- Filament Loading/Unloading ---
variable_cfg_fil_load_dist:    100.0            ; Fast load distance (mm)
variable_cfg_fil_purge_dist:   40.0             ; Slow purge distance after load (mm)
variable_cfg_fil_unload_dist:  100.0            ; Fast unload distance (mm)
; --- Sensorless Homing ---
variable_cfg_homing_current:   0.50             ; Motor current dropped to during sensorless homing (A)
gcode:
    ; Mandatory empty G-Code section for variable macros

# Boot script to calculate speeds and center coordinates dynamically based on config limits
[delayed_gcode _INIT_MY_VARS]
initial_duration: 2.0
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set max_vel = printer.configfile.settings.printer.max_velocity|float %}
    {% set max_z_vel = printer.configfile.settings.printer.max_z_velocity|float %}
    {% set max_x = printer.toolhead.axis_maximum.x|float %}
    {% set max_y = printer.toolhead.axis_maximum.y|float %}

    ; Compute mm/min feedrates based on the defined multiplier factor
    {% set speed_xy = (max_vel * vars.cfg_travel_factor_xy * 60)|int %}
    {% set speed_z = (max_z_vel * vars.cfg_travel_factor_z * 60)|int %}

    ; Compute physical center of the printer bounds
    {% set center_x = (max_x / 2.0)|float %}
    {% set center_y = (max_y / 2.0)|float %}

    ; Save computed values back to the variable macro for global access
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_travel_speed_xy VALUE={speed_xy}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_travel_speed_z VALUE={speed_z}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_center_x VALUE={center_x}
    SET_GCODE_VARIABLE MACRO=_MY_VARS VARIABLE=calc_center_y VALUE={center_y}


# ------------------------------------------------------------------------------
# MACROS: PRINT LIFECYCLE & STATE
# ------------------------------------------------------------------------------

# Memory state for pauses and filament changes
[gcode_macro _PRINT_STATE]
description: Memory for pauses and M600
variable_saved_ext_temp: 0.0
gcode:
    ; Mandatory empty G-Code section

# Main startup procedure
[gcode_macro PRINT_START]
description: Main startup procedure
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}

    ; --- PARAMETERS ---
    {% set target_bed = params.BED_TEMP|default(60.0)|float %}
    {% set target_ext = params.EXTRUDER_TEMP|default(200.0)|float %}
    {% set param_chamber = params.CHAMBER|default(0.0)|float %}

    ; Determine chamber target based on bed temperature threshold
    {% if param_chamber > 0.0 %}
        {% set target_cha = param_chamber %}
    {% elif target_bed >= vars.cfg_bed_high_temp %}
        {% set target_cha = 45.0 %}
    {% else %}
        {% set target_cha = 15.0 %}
    {% endif %}

    G21 ; Metric
    G90
    M83 ; Relative extrusion

    _RESET_STATE

    UPDATE_DELAYED_GCODE ID=_STOP_NEVERMORE DURATION=0

    ; Turn on Nevermore filter and part cooling fan if printing high-temp materials like ABS/ASA
    {% if target_bed >= vars.cfg_bed_high_temp %}
        _NOTIFY MSG="Process: Enabling Nevermore VOC filter"
        SET_FAN_SPEED FAN=nevermore SPEED=1.0
    {% endif %}

    _SET_LED_STATE STATE=heating
    ; Heat bed without blocking
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={target_bed}
    ; Pre-heat hotend to no ooze temp blocking
    M109 S{vars.cfg_preheat_ext}

    _CONDITIONAL_HOME
    CENTER

    G90 ; Explicitly enforce absolute positioning after state restore
    G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}

    _NOTIFY MSG="Process: Waiting for bed to reach {target_bed}C..."
    _SET_LED_STATE STATE=heating
    M190 S{target_bed} ; Wait for bed temp to settle

    _NOTIFY MSG="Process: Waiting for chamber to reach {target_cha}C..."
    _SET_LED_STATE STATE=busy
    TEMPERATURE_WAIT "temperature_sensor chamber" MINIMUM={target_cha} MINIMUM={target_cha} ; Blocking wait for chamber temp

    ; Final calibration after thermal expansion
    Z_TILT_ADJUST
    ; CLEAN_NOZZLE ; Nozzle Cleaning before CARTOGRAPHER_TOUCH for real Z0
    _SET_LED_STATE STATE=homing
    CARTOGRAPHER_TOUCH_HOME
    BED_MESH_CALIBRATE ADAPTIVE=1

    ; Move to safe purge location before final heat up to prevent oozing on the bed center
    G0 Z{vars.cfg_z_hop_heat} F{vars.calc_travel_speed_z}
    G0 X{vars.cfg_purge_x} Y{vars.cfg_purge_y} F{vars.calc_travel_speed_xy}

    _NOTIFY MSG="Process: Heating nozzle to {target_ext}C..."
    _SET_LED_STATE STATE=heating
    M109 S{target_ext}

    PRIME_BLOB
    _TOGGLE_FILAMENT_SENSORS ENABLE=0 ; Sensor will be enabled by slicer after layer 2
    _SET_LED_STATE STATE=printing
    _NOTIFY MSG="Process: Print job started."

# Finalization procedure after print job completion
[gcode_macro PRINT_END]
description: Finalize print job
gcode:
    M400
    G10 ; Retract
    TURN_OFF_HEATERS
    M107 ; Turn off fan
    _TOOLHEAD_PARK_PAUSE_CANCEL
    M84 ; Disable steppers
    _TOGGLE_FILAMENT_SENSORS ENABLE=1
    _RESET_STATE

    ; Keeps Nevermore running to filter remaining VOCs
    {% if printer['fan_generic nevermore'].speed|float > 0.0 %}
        _NOTIFY MSG="Process: Print finished. Filtering VOCs..."
        _SET_LED_STATE STATE=busy
        UPDATE_DELAYED_GCODE ID=_STOP_NEVERMORE DURATION=600
    {% else %}
        _NOTIFY MSG="Process: Print finished."
        _SET_LED_STATE STATE=ready
    {% endif %}

# Timed macro to turn off Nevermore filter
[delayed_gcode _STOP_NEVERMORE]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
    _NOTIFY MSG="System: Filter stopped."
    _SET_LED_STATE STATE=ready

# Hook executed during PAUSE state
[gcode_macro _HOOK_ON_PAUSE]
description: Hook executed when print is paused
gcode:
    _NOTIFY MSG="System: Print paused"
    _SET_LED_STATE STATE=ready

# Hook executed during RESUME state
[gcode_macro _HOOK_ON_RESUME]
description: Hook executed when print is resumed
gcode:
    _NOTIFY MSG="System: Print resumed"
    _SET_LED_STATE STATE=printing

# Hook executed during print CANCEL
[gcode_macro _HOOK_ON_CANCEL]
description: Hook executed when print is canceled
gcode:
    _TOGGLE_FILAMENT_SENSORS ENABLE=1

    ; Ensure machine state and background loops are fully reset on cancel
    _RESET_STATE

    ; Handle Nevermore filter post-cancel
    {% if printer['fan_generic nevermore'].speed|float > 0.0 %}
        _NOTIFY MSG="System: Print canceled. Filtering VOCs for 10 min."
        _SET_LED_STATE STATE=busy
        UPDATE_DELAYED_GCODE ID=_STOP_NEVERMORE DURATION=600
    {% else %}
         _NOTIFY MSG="System: Print canceled."
         _SET_LED_STATE STATE=ready
    {% endif %}


# ------------------------------------------------------------------------------
# MACROS: MOVEMENT & HOMING
# ------------------------------------------------------------------------------

# Homes axes only if they are not already homed
[gcode_macro _CONDITIONAL_HOME]
description: Homing only if necessary
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes|lower %}
        _NOTIFY MSG="System: Axes not homed. Executing G28..."
        G28
    {% else %}
        _NOTIFY MSG="System: Axes already homed. Skipping G28."
    {% endif %}

# Helper macro for sensorless homing on specific axes
[gcode_macro _HOME_AXIS]
description: Helper for sensorless homing
gcode:
    {% set axis = params.AXIS|string|lower %}
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set run_current_x = printer['tmc2209 stepper_x'].run_current|float %}
    {% set run_current_y = printer['tmc2209 stepper_y'].run_current|float %}

    ; Read current kinematics to restore them later
    {% set max_vel = printer.configfile.settings.printer.max_velocity|float %}
    {% set max_accel = printer.configfile.settings.printer.max_accel|float %}

    _NOTIFY MSG="System: Homing {axis|upper}..."
    SAVE_GCODE_STATE NAME=STATE_HOME_AXIS
    M400

    ; Drop TMC current to prevent harsh crashes during sensorless homing
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={vars.cfg_homing_current}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={vars.cfg_homing_current}

    ; Throttle kinematics severely during sensorless homing to prevent false StallGuard triggers from high jerk
    SET_VELOCITY_LIMIT VELOCITY=50 ACCEL=1000

    G4 P1000
    G28 {axis|upper}

    G91
    G0 {axis|upper}-10 F1200 ; Move away from endstop after homing
    G90

    ; Restore standard current and kinematics
    SET_VELOCITY_LIMIT VELOCITY={max_vel} ACCEL={max_accel}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={run_current_x}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={run_current_y}

    M400
    RESTORE_GCODE_STATE NAME=STATE_HOME_AXIS

# Custom homing override sequence
[homing_override]
axes: xyz
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}

    ; Determine which axes to home based on parameters
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    {% set home_x = home_all or 'X' in params %}
    {% set home_y = home_all or 'Y' in params %}
    {% set home_z = home_all or 'Z' in params %}

    G90

    _SET_LED_STATE STATE=homing

    ; Perform safe Z hop if Z is already homed to avoid scratching the bed
    {% if "z" in printer.toolhead.homed_axes %}
        {% set z_pos = printer.toolhead.position.z|float %}
        {% set z_max = printer.toolhead.axis_maximum.z|float %}
        {% set z_safe = [z_pos + vars.cfg_z_hop_home, z_max]|min %}

        G0 Z{z_safe} F{vars.calc_travel_speed_z}
    {% endif %}

    {% if home_x %}
        _HOME_AXIS AXIS=X                                       ; Home X axis sensorless
    {% endif %}

    {% if home_y %}
        _HOME_AXIS AXIS=Y                                       ; Home Y axis sensorless
    {% endif %}

    {% if home_z %}
        ; Ensure X and Y are homed before homing Z
        {% set x_homed = "x" in printer.toolhead.homed_axes %}
        {% set y_homed = "y" in printer.toolhead.homed_axes %}

        {% if (not x_homed and not home_x) or (not y_homed and not home_y) %}
            _HOME_AXIS AXIS=X ; Home X axis sensorless
            _HOME_AXIS AXIS=Y ; Home Y axis sensorless
        {% endif %}

        ; Move to center
        G0 X{vars.calc_center_x} Y{vars.calc_center_y} F{vars.calc_travel_speed_xy}

        _NOTIFY MSG="System: Homing Z..."
        G28 Z
        G0 Z{vars.cfg_z_hop_home} F{vars.calc_travel_speed_z} ; Perform Z hop after homing
    {% endif %}

    M400
    _SET_LED_STATE STATE=ready

# Helper to move toolhead to bed center
[gcode_macro CENTER]
description: Move toolhead to center with safe Z-bounding
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}

    _NOTIFY MSG="System: Moving toolhead to center..."
    SAVE_GCODE_STATE NAME=STATE_CENTER
    G90

    ; Lift Z safely before moving X/Y to avoid scraping the bed or printed parts.
    ; Capped at max_z to prevent mechanical crashing into the top frame.
    {% set z_safe = [printer.toolhead.position.z|float + vars.cfg_z_hop_home, printer.toolhead.axis_maximum.z|float]|min %}
    G0 Z{z_safe} F{vars.calc_travel_speed_z}
    G0 X{vars.calc_center_x} Y{vars.calc_center_y} F{vars.calc_travel_speed_xy}

    M400
    RESTORE_GCODE_STATE NAME=STATE_CENTER


# ------------------------------------------------------------------------------
# MACROS: CALIBRATION & TUNING
# ------------------------------------------------------------------------------

# Wrapper for Z_TILT_ADJUST to include notifications
[gcode_macro Z_TILT_ADJUST]
description: Adjust Z tilt
rename_existing: _Z_TILT_ADJUST
gcode:
    _NOTIFY MSG="Process: Level Gantry..."
    _SET_LED_STATE STATE=leveling
    _Z_TILT_ADJUST {rawparams}
    _SET_LED_STATE STATE=ready

# Wrapper for BED_MESH_CALIBRATE to include notifications
[gcode_macro BED_MESH_CALIBRATE]
description: Calibrate bed mesh
rename_existing: _MY_BED_MESH_CALIBRATE
gcode:
    _NOTIFY MSG="Process: Generating mesh..."
    _SET_LED_STATE STATE=meshing
    _MY_BED_MESH_CALIBRATE {rawparams}
    _SET_LED_STATE STATE=ready

# PID auto-tuning macro for heated bed
[gcode_macro PID_BED]
description: PID tuning for bed heater
gcode:
    {% set target_temp = params.TEMP|default(100.0)|float %}
    {% set vars = printer["gcode_macro _MY_VARS"] %}

    _NOTIFY MSG="System: Starting bed PID tuning ({target_temp}C)..."
    _CONDITIONAL_HOME

    CENTER
    G90
    G0 Z10.0 F{vars.calc_travel_speed_z}

    _SET_LED_STATE STATE=heating
    PID_CALIBRATE HEATER=heater_bed TARGET={target_temp}

    _NOTIFY MSG="System: Bed PID tuning complete. Save config."
    _SET_LED_STATE STATE=ready

# PID auto-tuning macro for extruder
[gcode_macro PID_HOTEND]
description: PID tuning for extruder heater
gcode:
    {% set target_temp = params.TEMP|default(245.0)|float %}
    ; Defaulting to 64 (~25%) for ABS, but overrideable via FAN parameter
    {% set fan_speed = params.FAN|default(64)|int %}
    {% set vars = printer["gcode_macro _MY_VARS"] %}

    _NOTIFY MSG="System: Starting extruder PID tuning ({target_temp}C)..."
    _CONDITIONAL_HOME

    CENTER
    G90
    G0 Z10.0 F{vars.calc_travel_speed_z}

    ; Activate part cooling fan to simulate realistic printing conditions
    M106 S{fan_speed}
    _SET_LED_STATE STATE=heating
    PID_CALIBRATE HEATER=extruder TARGET={target_temp}
    M107

    _NOTIFY MSG="System: Extruder PID tuning complete. Save config."
    _SET_LED_STATE STATE=ready


# ------------------------------------------------------------------------------
# MACROS: EXTRUDER & FILAMENT
# ------------------------------------------------------------------------------

# Extrudes a purge blob to prime the nozzle before a print
[gcode_macro PRIME_BLOB]
description: Purge nozzle via prime blob
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}

    ; Calculate dynamic extrusion multiplier based on current nozzle diameter vs 0.4 standard
    {% set vol_mult = 1.0 / ((0.4 / printer.configfile.settings.extruder.nozzle_diameter|float) ** 2) %}

    ; Only proceed if Klipper confirms the hotend is physically capable of extruding
    {% if printer.extruder.can_extrude %}
        _NOTIFY MSG="Process: Priming nozzle..."
        _SET_LED_STATE STATE=cleaning
        _TOGGLE_FILAMENT_SENSORS ENABLE=0

        SAVE_GCODE_STATE NAME=STATE_PRIME_BLOB
        G90
        M83

        ; Approach the purge location first
        G0 Z{vars.cfg_z_hop_home} F{vars.calc_travel_speed_z}
        G0 X{vars.cfg_purge_x} Y{vars.cfg_purge_y} F{vars.calc_travel_speed_xy}

        ; Drop Z
        G0 Z0.5 F{vars.calc_travel_speed_z}

        ; Extrude the main blob. Split into two 10mm commands to bypass Klipper's max_extrude_cross_section limit.
        ; Speed increased to F300 (5 mm/s) to push the blob firmly into the bed. Extrusion scaled by nozzle size.
        G1 E{(10.0 * vol_mult)|round(3)} F300
        G1 E{(10.0 * vol_mult)|round(3)} F300

        ; Turn on part cooling fan temporarily to cool the blob
        M106 S102

        ; Move the extruder up by 5mm while extruding to attach a string to the top of the blob
        G1 Z5.0 E{(5.0 * vol_mult)|round(3)} F100

        ; First, move strictly along the Y axis away from the blob, still extruding to stretch and anchor the string
        {% set stretch_y = [vars.cfg_purge_y + 15.0, printer.toolhead.axis_maximum.y|float]|min %}
        G1 Y{stretch_y} E{(1.0 * vol_mult)|round(3)} F200

        ; Loop to dynamically generate the segmented wipe steps moving downwards.
        ; Y moves strictly along the axis, while Z steps down by 1.2mm to prevent TUNING_TOWER aborts.
        {% for i in range(4) %}
            {% set loop_y = [vars.cfg_purge_y + 22.0 + (i * 7.0), printer.toolhead.axis_maximum.y|float]|min %}
            {% set loop_z = (3.8 - (i * 1.2))|round(1) %}
            G1 Y{loop_y} Z{loop_z} E{(0.5 * vol_mult)|round(3)} F200
        {% endfor %}

        M107 ; Turn part cooling fan off

        ; Extrude a small horizontal line just above the bed (Z0.2) to secure the tail of the wipe to the build plate
        {% set tail_y = [vars.cfg_purge_y + 50.0, printer.toolhead.axis_maximum.y|float]|min %}
        G1 Y{tail_y} Z0.2 E{(0.6 * vol_mult)|round(3)} F200

        ; Fast travel move along the X axis away from the wipe line to snap the filament string cleanly
        {% set snap_x = [vars.cfg_purge_x + 50.0, printer.toolhead.axis_maximum.x|float]|min %}
        G0 X{snap_x} F{vars.calc_travel_speed_xy}

        M400
        RESTORE_GCODE_STATE NAME=STATE_PRIME_BLOB
        _SET_LED_STATE STATE=ready
        _TOGGLE_FILAMENT_SENSORS ENABLE=1
    {% else %}
        _NOTIFY MSG="System Error: Extruder cold. Cannot execute prime blob."
    {% endif %}

# Automates nozzle wiping over a physical silicone brush
[gcode_macro CLEAN_NOZZLE]
description: Wipes nozzle on silicone comb
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set wipe_speed = vars.cfg_wipe_speed|int %}
    {% set center_x = vars.cfg_wipe_x|float %}
    {% set half_width = (vars.cfg_wipe_width|float / 2.0)|float %}

    ; Ensure nozzle is hot enough so filament doesn't stick
    {% if printer.extruder.temperature|float < vars.cfg_preheat_ext %}
        _SET_LED_STATE STATE=heating
        _NOTIFY MSG="Process: Heating nozzle to {vars.cfg_preheat_ext}C to protect silicone comb..."
        M109 S{vars.cfg_preheat_ext}
    {% endif %}

    _SET_LED_STATE STATE=cleaning
    _NOTIFY MSG="Process: Wiping on silicone comb..."
    SAVE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE
    G90
    G0 Z{vars.cfg_z_hop_home} F{vars.calc_travel_speed_z}
    G0 X{center_x} Y{vars.cfg_wipe_y|float} F{vars.calc_travel_speed_xy}
    G0 Z{vars.cfg_wipe_z|float} F{vars.calc_travel_speed_z}

    ; Wipe pattern across the brush
    {% for i in range(4) %}
        G0 X{center_x + half_width} F{wipe_speed}
        G0 X{center_x - half_width} F{wipe_speed}
        G0 X{center_x} F{wipe_speed}
    {% endfor %}

    G0 Z{(vars.cfg_wipe_z|float + 0.3)|float} Y{(vars.cfg_wipe_y|float + 1.0)|float} F{wipe_speed}

    {% for i in range(3) %}
        {% set shift = half_width + (1.5 * i) %}
        G0 X{center_x + shift} F{wipe_speed}
        G0 X{center_x - shift} F{wipe_speed}
        G0 X{center_x} F{wipe_speed}
    {% endfor %}

    G0 Z{vars.cfg_z_hop_home} F{vars.calc_travel_speed_z}

    M400
    RESTORE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE
    _SET_LED_STATE STATE=ready

# Automated filament loading routine with smart temperature restore and safety check
[gcode_macro LOAD_FILAMENT]
description: Load filament safely regardless of initial state
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}

    ; Determine target temperature (Priority: Parameter > Saved > Current > Fallback)
    {% set param_temp = params.TEMP|default(0)|float %}
    {% set current_target = printer.extruder.target|float %}
    {% set saved_temp = printer["gcode_macro _PRINT_STATE"].saved_ext_temp|float %}

    {% set target = 0.0 %}
    {% if param_temp >= min_temp %}
        {% set target = param_temp %}
    {% elif saved_temp >= min_temp %}
        {% set target = saved_temp %}
    {% elif current_target >= min_temp %}
        {% set target = current_target %}
    {% else %}
        {% set target = vars.cfg_fallback_temp_ext %}
    {% endif %}

    {% if target >= min_temp %}
        _NOTIFY MSG="Filament: Heating hotend to {target}C..."
        SAVE_GCODE_STATE NAME=STATE_LOAD_FILAMENT

        ; Blocking heat up
        _SET_LED_STATE STATE=heating
        M109 S{target}
        _SET_LED_STATE STATE=busy

        _TOGGLE_FILAMENT_SENSORS ENABLE=0
        M83

        _NOTIFY MSG="Filament: Loading {vars.cfg_fil_load_dist}mm..."
        G1 E{vars.cfg_fil_load_dist} F600
        G4 P1000
        _NOTIFY MSG="Filament: Purging {vars.cfg_fil_purge_dist}mm..."
        G1 E{vars.cfg_fil_purge_dist} F100
        G10 ; Quick retract
        M400

        RESTORE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
        _TOGGLE_FILAMENT_SENSORS ENABLE=1

        _NOTIFY MSG="Filament: Keeping hotend at {target}C for resume."

        ; Clear the saved state ONLY after successful load to not interfere with manual swaps
        SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE=0.0
        _NOTIFY MSG="Filament: Load sequence finished."
        _SET_LED_STATE STATE=ready
    {% else %}
        _NOTIFY MSG="System Error: Target temp {target}C is too low. Aborting."
    {% endif %}


# Automated filament unloading routine with smart temperature restore and safety check
[gcode_macro UNLOAD_FILAMENT]
description: Eject filament
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}

    ; Determine target temperature
    {% set param_temp = params.TEMP|default(0)|float %}
    {% set current_target = printer.extruder.target|float %}
    {% set saved_temp = printer["gcode_macro _PRINT_STATE"].saved_ext_temp|float %}

    {% set target = 0.0 %}
    {% if param_temp >= min_temp %}
        {% set target = param_temp %}
    {% elif saved_temp >= min_temp %}
        {% set target = saved_temp %}
    {% elif current_target >= min_temp %}
        {% set target = current_target %}
    {% else %}
        {% set target = vars.cfg_fallback_temp_ext %}
    {% endif %}

    {% if target >= min_temp %}
        _NOTIFY MSG="Filament: Heating hotend to {target}C..."
        SAVE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT

        ; Blocking heat up
        _SET_LED_STATE STATE=heating
        M109 S{target}
        _SET_LED_STATE STATE=busy

        _TOGGLE_FILAMENT_SENSORS ENABLE=0
        M83
        _NOTIFY MSG="Filament: Shaping tip..."

        ; Tip shaping sequence to prevent strings
        G1 E10.0 F300
        G1 E-15.0 F3000

        ; Loop to rapidly push and pull the filament to break strings
        {% for _ in range(4) %}
            G1 E2.0 F3000
            G1 E-2.0 F3000
        {% endfor %}

        _NOTIFY MSG="Filament: Unloading {vars.cfg_fil_unload_dist}mm..."
        G1 E-{vars.cfg_fil_unload_dist} F300
        M400

        RESTORE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
        _TOGGLE_FILAMENT_SENSORS ENABLE=1

        ; Target is maintained. Caller (like M600) decides if cooldown is needed.
        _NOTIFY MSG="Filament: Unload complete."
        _SET_LED_STATE STATE=ready
    {% else %}
        _NOTIFY MSG="System Error: Target temp {target}C is too low. Aborting."
    {% endif %}

# Standard filament change macro (triggered by runout sensors or slicer)
[gcode_macro M600]
description: Filament change
gcode:
    {% set target = printer.extruder.target|float %}

    ; Save the current print temperature for the load macro later
    SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE={target}

    PAUSE
    M400

    UNLOAD_FILAMENT TEMP={target}

    ; Turn off extruder to prevent cooking filament during long absence
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    _NOTIFY MSG="Action: Change filament. Extruder is cooling down."
    _SET_LED_STATE STATE=ready

# Globally disables/enables runout and motion sensors
[gcode_macro _TOGGLE_FILAMENT_SENSORS]
description: Globally toggle sensors
gcode:
    {% set state = params.ENABLE|default(1)|int %}
    SET_FILAMENT_SENSOR SENSOR=btt_sensor ENABLE={state} ; Toggle filament sensor


# ------------------------------------------------------------------------------
# MACROS: G-CODE ALIASES & DUMMIES
# ------------------------------------------------------------------------------

[gcode_macro G27]
description: Park Toolhead (Marlin compatibility)
gcode:
    _TOOLHEAD_PARK_PAUSE_CANCEL

[gcode_macro G29]
description: Bed mesh (Marlin compatibility)
gcode:
    BED_MESH_CALIBRATE

[gcode_macro G32]
description: Home and Bed leveling (RepRap compatibility)
gcode:
    _CONDITIONAL_HOME
    ; CLEAN_NOZZLE ; Nozzle Cleaning before CARTOGRAPHER_TOUCH for real Z0
    CARTOGRAPHER_TOUCH_HOME

[gcode_macro M108]
gcode:
    ; Dummy to prevent console spam (Marlin compatibility - Cancel Heating)

[gcode_macro M116]
gcode:
    ; Dummy to prevent console spam (RepRap compatibility - Wait for all temperatures)

[gcode_macro M201]
gcode:
    ; Dummy to prevent console spam (Marlin compatibility - Set Max Acceleration)

[gcode_macro M203]
gcode:
    ; Dummy to prevent console spam (Marlin compatibility - Set Max Feedrate)

[gcode_macro M205]
gcode:
    ; Dummy to prevent console spam (Marlin compatibility - Set Advanced Settings/Jerk)

[gcode_macro M300]
gcode:
    ; Placeholder to intercept M300 (Marlin/RepRap compatibility - Play Tone)

[gcode_macro M572]
description: Set Pressure Advance (RepRap compatibility)
gcode:
    {% set pa = params.S|default(-1.0)|float %}
    {% if pa >= 0.0 %}
        SET_PRESSURE_ADVANCE ADVANCE={pa}
    {% endif %}

[gcode_macro M900]
description: Set Pressure Advance (Marlin/Cura compatibility)
gcode:
    {% set param_s = params.S|default(-1.0)|float %}
    {% set pa = params.K|default(param_s)|float %}
    M572 S{pa}

[gcode_macro M601]
description: Pause print (PrusaSlicer/Marlin compatibility)
gcode:
    PAUSE

[gcode_macro M701]
description: Load filament (Marlin compatibility)
gcode:
    {% set param_t = params.T|default(0)|float %}
    {% set target_temp = params.S|default(param_t)|float %}
    LOAD_FILAMENT TEMP={target_temp}

[gcode_macro M702]
description: Unload filament (Marlin compatibility)
gcode:
    {% set param_t = params.T|default(0)|float %}
    {% set target_temp = params.S|default(param_t)|float %}
    UNLOAD_FILAMENT TEMP={target_temp}


# ------------------------------------------------------------------------------
# MACROS: SYSTEM HELPERS
# ------------------------------------------------------------------------------

# Centralized notification helper to push messages to display and console
[gcode_macro _NOTIFY]
description: Consistent message output
gcode:
    SET_DISPLAY_TEXT MSG="{params.MSG}"
    { action_respond_info(params.MSG) }

# Clears speeds, limits, bed meshes, and active loops back to default values
[gcode_macro _RESET_STATE]
description: Clears transformations and background loops
gcode:
    M220 S100 ; Reset speed factor
    M221 S100 ; Reset flow factor
    BED_MESH_CLEAR
    CLEAR_PAUSE
    SET_SKEW CLEAR=1
    SET_GCODE_OFFSET Z=0 ; Reset Z offset for Cartographer
    _SET_LED_STATE STATE=ready

    ; Reset limits to config defaults
    {% set max_vel = printer.configfile.settings.printer.max_velocity %}
    {% set max_accel = printer.configfile.settings.printer.max_accel %}
    {% set max_sqv = printer.configfile.settings.printer.square_corner_velocity %}
    SET_VELOCITY_LIMIT VELOCITY={max_vel} ACCEL={max_accel} SQUARE_CORNER_VELOCITY={max_sqv}

    ; Clear saved temperature state on cancel to prevent issues on next print
    SET_GCODE_VARIABLE MACRO=_PRINT_STATE VARIABLE=saved_ext_temp VALUE=0.0

# Print computed boot variables to console for testing
[gcode_macro DEBUG_VARS]
description: Print computed variables to console
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    _NOTIFY MSG="--- Computed Boot Variables ---"
    _NOTIFY MSG="Center X: {vars.calc_center_x} mm"
    _NOTIFY MSG="Center Y: {vars.calc_center_y} mm"
    _NOTIFY MSG="Travel Speed X/Y: {vars.calc_travel_speed_xy} mm/min"
    _NOTIFY MSG="Travel Speed Z: {vars.calc_travel_speed_z} mm/min"
    _NOTIFY MSG="-------------------------------"

[gcode_macro _SET_LED_STATE]
description: Set LED colors based on state
gcode:
    {% set state = params.STATE|default('ready')|string|lower %}

    {% set colors = {
        'off':      {'r': 0.0, 'g': 0.0, 'b': 0.0}, ; Turn LEDs off
        'ready':    {'r': 0.1, 'g': 0.1, 'b': 0.1}, ; Set LEDs to ready state (Dim white)
        'busy':     {'r': 1.0, 'g': 0.0, 'b': 0.0}, ; Set LEDs to busy state (Red)
        'heating':  {'r': 1.0, 'g': 0.5, 'b': 0.0}, ; Set LEDs to heating state (Orange)
        'leveling': {'r': 1.0, 'g': 1.0, 'b': 0.0}, ; Set LEDs to leveling state (Yellow)
        'homing':   {'r': 0.0, 'g': 1.0, 'b': 1.0}, ; Set LEDs to homing state (Cyan)
        'cleaning': {'r': 0.0, 'g': 0.0, 'b': 1.0}, ; Set LEDs to cleaning state (Blue)
        'meshing':  {'r': 0.0, 'g': 1.0, 'b': 0.0}, ; Set LEDs to meshing state (Green)
        'printing': {'r': 1.0, 'g': 1.0, 'b': 1.0}  ; Set LEDs to printing state (White)
    } %}

    {% if state in colors %}
        SET_LED LED="toolhead_leds" RED={colors[state].r} GREEN={colors[state].g} BLUE={colors[state].b}
    {% else %}
        { action_respond_info("System Error: Unknown LED state '" ~ state ~ "'") }
    {% endif %}

[delayed_gcode SET_LEDS_ON_BOOT]
initial_duration: 1.0
gcode:
    ; Set initial LED state to ready after boot sequence finishes
    _SET_LED_STATE STATE=ready


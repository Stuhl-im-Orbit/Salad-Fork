# Wrapper for Z_TILT_ADJUST to include LED status and notifications
[gcode_macro Z_TILT_ADJUST]
description: Adjust Z tilt
rename_existing: _MY_Z_TILT_ADJUST
gcode:
    _STATUS_LEVELING
    _NOTIFY MSG="Process: Adjusting Z-tilt..."
    _MY_Z_TILT_ADJUST {rawparams}
    _STATUS_READY

# Wrapper for BED_MESH_CALIBRATE to include LED status and notifications
[gcode_macro BED_MESH_CALIBRATE]
description: Calibrate bed mesh
rename_existing: _MY_BED_MESH_CALIBRATE
gcode:
    _STATUS_MESHING
    _NOTIFY MSG="Process: Generating mesh..."
    _MY_BED_MESH_CALIBRATE {rawparams}
    _STATUS_READY

# PID auto-tuning macro for heated bed
[gcode_macro PID_BED]
description: PID tuning for bed heater
gcode:
    {% set target_temp = params.TEMP|default(100.0)|float %}

    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set travel_xy = (printer.configfile.settings.printer.max_velocity|float * vars.cfg_travel_factor_xy|float * 60)|int %}
    {% set travel_z = (printer.configfile.settings.printer.max_z_velocity|float * vars.cfg_travel_factor_z|float * 60)|int %}
    {% set center_x = (printer.toolhead.axis_maximum.x|float / 2.0)|float %}
    {% set center_y = (printer.toolhead.axis_maximum.y|float / 2.0)|float %}

    _STATUS_HEATING
    _NOTIFY MSG="System: Starting bed PID tuning ({target_temp}C)..."
    _CONDITIONAL_HOME
    G90
    G0 Z10.0 F{travel_z}
    G0 X{center_x} Y{center_y} F{travel_xy}
    PID_CALIBRATE HEATER=heater_bed TARGET={target_temp}
    CENTER
    _STATUS_READY
    _NOTIFY MSG="System: Bed PID tuning complete. Save config."

# PID auto-tuning macro for extruder
[gcode_macro PID_HOTEND]
description: PID tuning for extruder heater
gcode:
    {% set target_temp = params.TEMP|default(245.0)|float %}

    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set travel_xy = (printer.configfile.settings.printer.max_velocity|float * vars.cfg_travel_factor_xy|float * 60)|int %}
    {% set travel_z = (printer.configfile.settings.printer.max_z_velocity|float * vars.cfg_travel_factor_z|float * 60)|int %}
    {% set center_x = (printer.toolhead.axis_maximum.x|float / 2.0)|float %}
    {% set center_y = (printer.toolhead.axis_maximum.y|float / 2.0)|float %}

    _STATUS_HEATING
    _NOTIFY MSG="System: Starting extruder PID tuning ({target_temp}C)..."
    _CONDITIONAL_HOME
    G90
    G0 Z10.0 F{travel_z}
    G0 X{center_x} Y{center_y} F{travel_xy}
    G0 Z5.0 F{travel_z}
    M106 S64 ; Turn on part fan at 25% to simulate printing conditions
    PID_CALIBRATE HEATER=extruder TARGET={target_temp}
    M107
    CENTER
    _STATUS_READY
    _NOTIFY MSG="System: Extruder PID tuning complete. Save config."


# ------------------------------------------------------------------------------
# MACROS: EXTRUDER & FILAMENT
# ------------------------------------------------------------------------------

# Extrudes a purge blob to prime the nozzle before a print
[gcode_macro PRIME_BLOB]
description: Purge nozzle via prime blob
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set max_vel_xy = printer.configfile.settings.printer.max_velocity|float %}
    {% set travel_xy = (max_vel_xy * vars.cfg_travel_factor_xy|float * 60)|int %}
    {% set travel_z = (printer.configfile.settings.printer.max_z_velocity|float * vars.cfg_travel_factor_z|float * 60)|int %}
    {% set b_speed = 200|int %}
    {% set max_y = printer.toolhead.axis_maximum.y|float %}
    {% set base_y = (printer.toolhead.axis_minimum.y|float + 5.0)|float %}

    _STATUS_CLEANING
    _NOTIFY MSG="Process: Priming nozzle..."
    _TOGGLE_FILAMENT_SENSORS ENABLE=0
    SAVE_GCODE_STATE NAME=STATE_PRIME_BLOB
    G90
    M83

    ; Toolhead is already at X/Y from PRINT_START. Just drop Z.
    G0 Z0.5 F{travel_z}
    G1 E20.0 F60
    M106 S102 ; Turn on part cooling fan temporarily
    G1 Z5.0 E5.0 F100

    ; Note: The wipe movement is deliberately segmented into multiple small Z steps.
    ; If done in a single continuous move > 2mm, Klipper's TUNING_TOWER module 
    ; misinterprets the large Z-axis change as a new layer/print phase and will abort.
    G1 Y{[base_y + 25.0, max_y]|min} E1.0 F{b_speed}
    G1 Y{[base_y + 30.0, max_y]|min} Z3.8 E0.5 F{b_speed}
    G1 Y{[base_y + 35.0, max_y]|min} Z2.6 E0.5 F{b_speed}
    G1 Y{[base_y + 40.0, max_y]|min} Z1.4 E0.5 F{b_speed}
    G1 Y{[base_y + 45.0, max_y]|min} Z0.2 E0.5 F{b_speed}
    M107

    G1 Y{[base_y + 50.0, max_y]|min} Z0.2 E0.6 F{b_speed}
    G0 Y{[base_y + 100.0, max_y]|min} F{(max_vel_xy * 60)|int}

    M400
    RESTORE_GCODE_STATE NAME=STATE_PRIME_BLOB
    _TOGGLE_FILAMENT_SENSORS ENABLE=1
    _STATUS_READY

# Automates nozzle wiping over a physical silicone brush
[gcode_macro CLEAN_NOZZLE]
description: Wipes nozzle on silicone comb
gcode:
    {% set vars = printer["gcode_macro _MY_VARS"] %}
    {% set travel_xy = (printer.configfile.settings.printer.max_velocity|float * vars.cfg_travel_factor_xy|float * 60)|int %}
    {% set travel_z = (printer.configfile.settings.printer.max_z_velocity|float * vars.cfg_travel_factor_z|float * 60)|int %}
    {% set wipe_speed = 4000|int %}
    {% set center_x = vars.cfg_wipe_x|float %}
    {% set half_width = (vars.cfg_wipe_width|float / 2.0)|float %}

    ; Ensure nozzle is hot enough so filament doesn't stick
    {% if printer.extruder.temperature|float < 150.0 %}
        _STATUS_HEATING
        _NOTIFY MSG="Process: Heating nozzle to 150C to protect silicone comb..."
        M109 S150
    {% endif %}

    _STATUS_CLEANING
    _NOTIFY MSG="Process: Wiping on silicone comb..."
    SAVE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE
    G90
    G0 Z10.0 F{travel_z}
    G0 X{center_x} Y{vars.cfg_wipe_y|float} F{travel_xy}
    G0 Z{vars.cfg_wipe_z|float} F{travel_z}

    ; Wipe pattern across the brush
    {% for i in range(4) %}
        G0 X{center_x + half_width} F{wipe_speed}
        G0 X{center_x - half_width} F{wipe_speed}
        G0 X{center_x} F{wipe_speed}
    {% endfor %}

    G0 Z{(vars.cfg_wipe_z|float + 0.3)|float} Y{(vars.cfg_wipe_y|float + 1.0)|float} F{wipe_speed}

    {% for i in range(3) %}
        {% set shift = half_width + (1.5 * i) %}
        G0 X{center_x + shift} F{wipe_speed}
        G0 X{center_x - shift} F{wipe_speed}
        G0 X{center_x} F{wipe_speed}
    {% endfor %}

    G0 Z10.0 F{travel_z}

    M400
    RESTORE_GCODE_STATE NAME=STATE_CLEAN_NOZZLE
    _STATUS_READY

# Automated filament loading routine
[gcode_macro LOAD_FILAMENT]
description: Load filament
gcode:
    {% set param_temp = params.TEMP|default(220)|float %}

    {% set target = param_temp|int if param_temp >= printer.configfile.settings.extruder.min_extrude_temp|float else 220.0 %}

    _STATUS_HEATING
    _NOTIFY MSG="Filament: Heating hotend to {target}C..."
    SAVE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
    M109 S{target}

    _STATUS_BUSY
    _TOGGLE_FILAMENT_SENSORS ENABLE=0
    M83
    _NOTIFY MSG="Filament: Loading 100.0mm..."
    G1 E100.0 F600
    G4 P1000
    _NOTIFY MSG="Filament: Purging 40.0mm..."
    G1 E40.0 F100
    G10
    M400
    RESTORE_GCODE_STATE NAME=STATE_LOAD_FILAMENT
    _TOGGLE_FILAMENT_SENSORS ENABLE=1
    _STATUS_READY
    _NOTIFY MSG="Filament: Load complete."

# Automated filament unloading routine (shapes tip before ejecting)
[gcode_macro UNLOAD_FILAMENT]
description: Eject filament
gcode:
    {% set param_temp = params.TEMP|default(220)|float %}

    {% set target = param_temp|int if param_temp >= printer.configfile.settings.extruder.min_extrude_temp|float else 220.0 %}

    _STATUS_HEATING
    _NOTIFY MSG="Filament: Heating hotend to {target}C..."
    SAVE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
    M109 S{target}

    _STATUS_BUSY
    _TOGGLE_FILAMENT_SENSORS ENABLE=0
    M83
    _NOTIFY MSG="Filament: Shaping tip..."
    ; Tip shaping sequence to prevent strings
    G1 E10.0 F300
    G1 E-15.0 F3000
    G1 E2.0 F3000
    G1 E-2.0 F3000
    G1 E2.0 F3000
    G1 E-2.0 F3000
    G1 E2.0 F3000
    G1 E-2.0 F3000
    _NOTIFY MSG="Filament: Unloading 100.0mm..."
    G1 E-100.0 F300
    M400
    RESTORE_GCODE_STATE NAME=STATE_UNLOAD_FILAMENT
    _TOGGLE_FILAMENT_SENSORS ENABLE=1
    _STATUS_READY
    _NOTIFY MSG="Filament: Unload complete."

# Standard filament change macro (triggered by runout sensors or slicer)
[gcode_macro M600]
description: Filament change
gcode:
    {% set target = printer.extruder.target|float %}
    PAUSE
    _STATUS_BUSY
    UNLOAD_FILAMENT TEMP={target}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    _NOTIFY MSG="Action: Change filament with ({target}C) or clear runout."

# Globally disables/enables runout and motion sensors
[gcode_macro _TOGGLE_FILAMENT_SENSORS]
description: Globally toggle sensors
gcode:
    {% set state = params.ENABLE|default(1)|int %}

    SET_FILAMENT_SENSOR SENSOR=filament_switch ENABLE={state}
    SET_FILAMENT_SENSOR SENSOR=filament_motion ENABLE={state}

